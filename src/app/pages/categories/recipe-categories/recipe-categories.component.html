<div class="container board">
  <div class="row">
    <div class="input-group search">
      <input type="search" class="form-control" placeholder="Search" name="search" #search [ngModel]="searchTerm()" (ngModelChange)="searchTerm.set($event)">
      <div class="input-group-append">
        <button class="btn btn-primary btn-cochef">
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>
    <div class="input-group add">
      <input class="form-control" type="text" placeholder="new category :" name="name" #recipeCategoryName>
      <div class="input-group-append">
        <a class="btn btn-primary btn-cochef" (click)="addRecipeCategory(recipeCategoryName.value); recipeCategoryName.value=''">Add +</a>
      </div>
    </div>
  </div>

  <table class="table">
    <thead>
      <tr class="tr-center">
        <th>#</th>
        <th>Name</th>
        <th> </th>
      </tr>
    </thead>
    <tbody>
      @for (recipeCategory of recipesCategories() | filter:searchTerm(); track recipeCategory.id) {
        <tr class="tr-center">
          <td> {{recipeCategory.id}} </td>
          <td> {{recipeCategory.name}} </td>
          <td>
            <a class="btn btn-danger" (click)="deleteRecipeCategory(recipeCategory); searchTerm.set('')">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
